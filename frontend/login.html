<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Predição de Custo de Seguro Médico</title>
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>
  <main class="container auth-container">
    <h1>Predição de Custo de Seguro Médico</h1>
    <p class="subtitle">Entre com sua conta ou crie uma nova para continuar.</p>

    <div class="tabs">
      <button type="button" class="tab active" data-mode="login">Entrar</button>
      <button type="button" class="tab" data-mode="signup">Cadastrar</button>
    </div>

    <form id="auth-form">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" minlength="6" required autocomplete="current-password" />
      </div>

      <button type="submit" id="submit-button">Entrar</button>
    </form>

    <section id="result" class="result hidden"></section>
  </main>

  <script src="firebase-config.js?v=5"></script>
  <script type="module" src="login.js?v=5"></script>
</body>
</html>
