<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predição de Custo de Seguro Médico</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Predição de Custo de Seguro Médico</h1>
    <p class="subtitle">Informe os dados do segurado para estimar o custo (charges).</p>

    <form id="predict-form">
      <div class="field">
        <label for="age">Idade</label>
        <input type="number" id="age" name="age" min="18" max="100" required />
      </div>

      <div class="field">
        <label for="sex">Sexo</label>
        <select id="sex" name="sex" required>
          <option value="female">Feminino</option>
          <option value="male">Masculino</option>
        </select>
      </div>

      <div class="field">
        <label for="bmi">IMC (BMI)</label>
        <input type="number" id="bmi" name="bmi" min="10" max="80" step="0.1" required />
      </div>

      <div class="field">
        <label for="children">Filhos dependentes</label>
        <input type="number" id="children" name="children" min="0" max="10" required />
      </div>

      <div class="field">
        <label for="smoker">Fumante</label>
        <select id="smoker" name="smoker" required>
          <option value="no">Não</option>
          <option value="yes">Sim</option>
        </select>
      </div>

      <div class="field">
        <label for="region">Região</label>
        <select id="region" name="region" required>
          <option value="southwest">Southwest</option>
          <option value="southeast">Southeast</option>
          <option value="northwest">Northwest</option>
          <option value="northeast">Northeast</option>
        </select>
      </div>

      <button type="submit">Prever custo</button>
    </form>

    <section id="result" class="result hidden"></section>

    <section class="history">
      <h2>Predições recentes</h2>
      <table id="history-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Idade</th>
            <th>Sexo</th>
            <th>IMC</th>
            <th>Filhos</th>
            <th>Fumante</th>
            <th>Região</th>
            <th>Custo previsto</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
